  ErrorResponse:
    description: Server error
    content:
      application/json:
        schema:
          "$ref": "./schemas/common.yaml#/Error"
  ErrorEscResponse:
    description: Server error
    content:
      application/json:
        schema:
          allOf:
          - "$ref": "./schemas/common.yaml#/Error"
          - type: object
            properties:
              errors:
                type: array
                description: Additional error details
                items:
                  "$ref": "./schemas/common.yaml#/EscError"
                example:
                - code: 500
                  message: An error occurred
                  careerId: '123456'
  BadRequestResponse:
    description: Bad request
    content:
      application/json:
        schema:
          "$ref": "./schemas/common.yaml#/Error"
  UnauthorizedResponse:
    description: Non autorizzato
  NotFoundResponse:
    description: Risorsa non trovata
  ConflictResponse:
    description: Conflitto
  CreatedAckResponse:
    description: Creato
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: string
                status:
                  type: string
                  example: created
              required:
              - id
              - status
          required:
          - data
