  FacultyCalendar:
    type: object
    properties:
      id:
        type: string
        example: teaching
      name:
        type: string
        example: Calendario didattico
      description:
        type: string
        nullable: true
        example: Eventi legati ai corsi e alle attività accademiche.
      color:
        type: string
        nullable: true
        description: Colore principale del calendario espresso in formato HEX.
        example: "#1976D2"
      supportsEventCreation:
        type: boolean
        description: Indica se il docente può creare eventi manuali nel calendario.
        example: true
      defaultVisible:
        type: boolean
        nullable: true
        description: true se il calendario è mostrato per impostazione predefinita.
