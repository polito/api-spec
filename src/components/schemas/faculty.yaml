      title:
        type: string
        example: Brainstorming for new Activities
      type:
        "$ref": "#/FacultyCalendarEventTypeEnum"
      startsAt:
        type: string
        format: date-time
        example: '2023-12-18T14:00:00.000Z'
      endsAt:
        type: string
        format: date-time
        example: '2023-12-18T15:30:00.000Z'
      allDay:
        type: boolean
        example: false
      place:
        "$ref": "./common.yaml#/PlaceRef"
      externalLocation:
        type: string
        nullable: true
        example: Sala riunioni Dipartimento DAUIN
      isLive:
        type: boolean
        example: false
        description: Indica se l'evento è trasmesso in diretta streaming.
      materials:
        type: array
        items:
          "$ref": "#/FacultyCalendarEventMaterial"
        description: Materiali collegati all'evento.
      notes:
        type: string
        nullable: true
        example: Portare il materiale per il laboratorio.
    required:
    - id
    - calendarId
    - title
    - type
    - startsAt
    - endsAt
    - allDay
    additionalProperties: false
  FacultyCalendarEventCreateRequest:
    type: object
    properties:
      title:
        type: string
        example: Brainstorming for new Activities
      type:
        "$ref": "#/FacultyCalendarEventTypeEnum"
      startsAt:
        type: string
        format: date-time
        example: '2023-12-18T16:00:00.000Z'
      endsAt:
        type: string
        format: date-time
        example: '2023-12-18T17:30:00.000Z'
      allDay:
        type: boolean
        example: false
      placeId:
        type: string
        nullable: true
        description: Identificativo della stanza selezionata (es. roomId).
        example: ROOM_002
      externalLocation:
        type: string
        nullable: true
        description: Descrizione libera della location, usata in alternativa a placeId.
        example: Sala riunioni Dipartimento DAUIN
      notes:
        type: string
        nullable: true
        example: Preparare i materiali introduttivi.
      materialIds:
        type: array
        items:
          type: string
        description: Identificativi dei materiali didattici da associare all'evento.
      videoConferenceUrl:
        type: string
        format: uri
        nullable: true
        example: https://polito.webex.com/meet/docente
    required:
    - title
    - type
    - startsAt
    - endsAt
    - allDay
    additionalProperties: false
  FacultyCalendarEventUpsertRequest:
    type: object
