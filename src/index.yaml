openapi: 3.1.1
info:
  title: Polito Students API
  version: 2.2.3
  license:
    name: CC BY-NC 4.0
    url: https://creativecommons.org/licenses/by-nc/4.0/
servers:
- url: https://app.didattica.polito.it/api
  description: Production server (uses live data)
- url: https://app.didattica.polito.it/mock/api
  description: Mock server (uses example data)
security:
- bearerAuth: []
tags:
- name: Common - Auth
  description: Autenticazione e servizi collegati.
- name: Common - Profile
  description: Profilo utente, messaggi, notifiche e preferenze.
- name: Common - News
  description: News dell'Ateneo.
- name: Common - Places
  description: Mappa e POI di ateneo.
- name: Common - Emergencies
  description: Numeri e riferimenti di emergenza.
- name: Common - Faults
  description: Segnalazione guasti e tracciamento stato.
- name: Common - People
  description: Ricerca e dettaglio contatti della comunità di ateneo.
- name: Common - Bookings
  description: Prenotazioni aule/laboratori e slot disponibili.
- name: Common - Courses
  description: Consultazione condivisa delle informazioni sui corsi.
- name: Students - Auth
  description: Funzionalità di autenticazione specifiche per studenti.
- name: Students - Student
  description: Operazioni sul profilo studente.
- name: Students - Exams
  description: Gestione prenotazioni e informazioni sugli appelli d'esame.
- name: Students - Lectures
  description: Calendario lezioni, esercitazioni e aule virtuali.
- name: Students - Esc
  description: Gestione della European Student Card.
- name: Students - Tickets
  description: Apertura e monitoraggio ticket di supporto.
- name: Students - Job offers
  description: Consultazione offerte di lavoro e opportunità di carriera.
- name: Students - Offering
  description: Navigazione dell'offerta formativa e dei corsi di laurea.
- name: Students - Surveys
  description: Questionari e rilevazioni rivolte agli studenti.
- name: Faculty - Profile
  description: Operazioni specifiche sul profilo del docente.
- name: Faculty - Exams
  description: Gestione appelli e iscritti lato docente.
- name: Faculty - Courses
  description: Gestione incarichi didattici del docente, lezioni, materiali, avvisi e collaboratori.
- name: Faculty - Digital Signature
  description: Elenco e firma digitale documenti.
- name: Faculty - Calendar
  description: Consultazione e gestione dei calendari e degli eventi dell'agenda docente.
x-tagGroups:
- name: Common
  tags:
  - Common - Auth
  - Common - Profile
  - Common - News
  - Common - Places
  - Common - Emergencies
  - Common - Faults
  - Common - People
  - Common - Bookings
  - Common - Courses
- name: Students
