  "/surveys":
    get:
      tags:
      - Students - Surveys
      summary: Get surveys | Mostra survey
      operationId: getSurveys
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "../../components/schemas/students.yaml#/Survey"
                required:
                - data
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"