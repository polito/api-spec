  "/exams/{examId}/booking":
    post:
      tags:
      - Students - Exams
      summary: Book exam | Prenota esame
      operationId: bookExam
      parameters:
      - name: examId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                courseShortcode:
                  type: string
                  description: The course shortcode
                  example: 01UDROV
                questionId:
                  type: integer
                  description: The id of the question
                  example: 123456
                questionOption:
                  type: integer
                  description: The index of the chosen option (starting at 1)
                  example: 1
                requestReason:
                  type: string
                  description: The reason for the exam booking request
                  example: I'm not sure
              required:
              - courseShortcode
        required: true
      responses:
        200:
          description: Success
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        404:
          description: Exam not found
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/common.yaml#/Error"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
    delete:
      tags:
      - Students - Exams
      summary: Delete exam booking | Annulla prenotazione esame
      operationId: deleteExamBookingById
      parameters:
      - name: examId
        in: path
        required: true
        schema:
          type: integer
      responses:
        200:
          description: Success
        404:
          description: Exam or booking not found
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/common.yaml#/Error"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/exams/{examId}/rescheduleRequest":
    post:
      tags:
      - Students - Exams
      summary: Ask to reschedule an exam | Chiedi di spostare un esame
      operationId: rescheduleExam
      parameters:
      - name: examId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                courseShortcode:
                  type: string
                  description: The course shortcode
                  example: 01UDROV
                requestReason:
                  type: string
                  description: The reason for the exam booking request
                  example: Nei giorni dell'appello ho i Campionati Italiani di nuoto
                requestDetails:
                  type: string
                  description: The proposed dates for the exam
                  example: Io potrei sostenerlo prima del 15 febbraio oppure dopo
                    il 21
              required:
              - courseShortcode
              - requestReason
              - requestDetails
        required: true
      responses:
        200:
          description: Success
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        404:
          description: Exam not found
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/common.yaml#/Error"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"