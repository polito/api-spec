  "/courses/{courseId}/guide":
    get:
      tags:
      - Common - Courses
      summary: Show guide | Mostra guida
      operationId: getCourseGuide
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: integer
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "../../components/schemas/common.yaml#/CourseGuideSection"
                required:
                - data
              example:
                data:
                - title: Presentazione
                  content: Nowadays, computing devices are ubiquitously present and
                    integrated in our daily life. Sensors and actuators are, indeed,
                    embedded in home appliances, lights, or cars; wearable devices
                    like smart watches provide information at glance and act as always-on
                    and personal digital extensions; smartphones and tablets are widely
                    spread. Moreover, most of such devices are Internet-connected
                    and powered by Artificial Intelligence, and people communicate
                    with them by using various interaction paradigms, ranging from
                    "click", to touch, to gestures, speech, or tangible manipulation.
                    As the technology improves, however, we are challenged of how
                    to design suitable interfaces and interactions, so that people
                    can use such technologies with "joy" rather than "frustration".\f\n\f\nThis
                    course would provide a strong foundation to address this challenge.
                    In addition, the course will give students hands-on practice to
                    master this complexity and to develop innovative solutions by
                    adopting a modern human-centered design process while building
                    a web application to serve a set of target users. In the end,
                    students will learn how to design and build technologies usable,
                    useful, and used.
                - title: Risultati attesi
                  content: Knowledge:\f\n- Concepts of Usability, User Experience\f\n-
                    User centered design processes and their application\f\n- Novel
                    Interaction Technologies\f\n\f\nSkills:\f\n- Developing a working
                    prototype according to a human-centered design process\f\n- Mastering
                    some novel interaction technologies\f\n- Experience joint development
                    of a project in a group of engineers
                - title: Prerequisiti
                  content: "- Programming skills\\f\\n- Knowledge on web and related
                    technologies/languages (e.g., HTML, JS, client-server architectures,
                    …)\\f\\n- Attitude towards working in teams\\f\\n"
                - title: Programma
                  content: 'Course topics will cover three areas: \f\n\f\n - Introduction
                    to Human-Computer Interaction: history, the human, the computer,
                    vision of the future.\f\n\f\n - Building interactive applications
                    with a human-centered process. The main tasks and methods to design,
                    develop, and evaluate an interactive application: needfindings
                    strategies, low- and high-fidelity prototypes, mental models and
                    visual design, heuristic evaluation, and basic concepts and methods
                    for controlled experiments (3 credits of lectures and exercises).\f\nThis
                    part will focus, in general, on the design process. Such concepts
                    will be applied to a specific application domain in the development
                    of a group project, which will be carried on during the lab hours
                    (2 credits). \f\n\f\n - "Beyond WIMP" paradigms: e.g., interaction
                    with AI-powered systems, tangible interaction, voice user interfaces,
                    wearables, gestures, and eye tracking. Selected paradigms will
                    be discussed from different perspectives, ranging from rationale
                    and vision, to contemporary examples and development tools (1
                    credit). Thematic seminars on emerging topics might also be included,
                    as well as the illustration of specific "case studies".\f\n\f\nMost
                    of the topics will have a theoretical (in-class) foundation plus
                    hands-on (in-lab) experiences by using web technologies. Students
                    projects will follow the proposed human-centered design process
                    and will submit intermediate deliverables. Projects will consist
                    of interactive prototypes as modern web applications, in which
                    a "beyond WIMP" paradigm might be exploited for user interaction.\f\n\f\nDuring
                    the course, communication within teams and with teachers as well
                    as project development will adopt contemporary solutions and tools
                    (e.g., Git and GitHub, Slack/Discord, …).'
                - title: Note
                  content: ''
                - title: Organizzazione dell'insegnamento
                  content: The learning method is both project-based (i.e., students
                    learn by doing a project) and problem-based (i.e., the project
                    work starts from real users’ needs), with teams of students working
                    together towards a common goal. \f\n\f\nProject-related activities
                    will start since the beginning of the course and teachers will
                    provide support and guidance for the entire semester. The project
                    will be accompanied by deliverables to be prepared before given
                    deadlines. \f\n\f\nThe course may include live seminars by people
                    from industry or other organizations.
                - title: Bibliografia
                  content: "* Course slides and related materials (e.g., links, readings,
                    …)\\f\\n* Selected chapters of:\\f\\n - Alan Dix, Janet Finlay,
                    Gregory Abowd, Russell Beale: Human Computer Interaction, 3rd
                    Edition, Prentice Hall, 2004, ISBN 0-13-046109-1\\f\\n - Shneiderman,
                    Plaisant, Cohen, Jacobs, Elmqvist & Diakopoulos: Designing the
                    User Interface: Strategies for Effective Human-Computer Interaction,
                    6th Edition, Pearson, 2016, 013438038X / 9780134380384\\f\\n"
                - title: Regole d'esame
                  content: 'The exam consists in a written test (in class) and in
                    the evaluation of the group project. The two parts are mandatory
                    and must be taken in the same academic year.\f\n\f\nThe written
                    exam will be closed-note (no books nor notes) and on the topics
                    covered during the lectures (i.e., no code or project-related
                    questions). The duration will be 60 minutes, and will consist
                    of a set of open questions. It will account for 40% of the score,
                    with a minimum threshold.\f\n\f\nThe group project will be evaluated
                    through an oral session, where all group components must be present.\f\nThe
                    evaluation criteria for the group project include: effort invested
                    in the project activity; originality, complexity, and richness
                    of the solution; methodological and technical correctness; completeness
                    and communication quality of the deliverables; presentation and
                    oral discussion; individual contribution. It will account for
                    60% of the score'
        404:
          description: Course not found
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/common.yaml#/Error"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
