  "/v2/places/bookings":
    put:
      tags:
      - Common - Places
      summary: Crea o aggiorna prenotazione spazio | Create or update a place booking
      operationId: upsertPlaceBooking
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../../components/schemas/common.yaml#/PlaceBookingUpsertRequest"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/PlaceBooking"
                required:
                - data
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '409':
          "$ref": "../../components/responses.yaml#/ConflictResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
    get:
      tags:
      - Common - Places
      summary: Elenca prenotazioni spazi | List place bookings
      operationId: getPlaceBookings
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: status
        description: Filtro per stato prenotazione.
        schema:
          type: string
          enum:
          - PENDING
          - ACCEPTED
          - REJECTED
      - in: query
        name: type
        description: Filtro per tipologia prenotazione.
        schema:
          type: string
          enum:
          - ROOM
          - STRUCTURE
          - EVENT
      - in: query
        name: siteId
        schema:
          type: string
        description: Limita le prenotazioni ad una specifica sede.
      - in: query
        name: from
        schema:
          type: string
          format: date-time
        description: Mostra prenotazioni con inizio a partire da questo istante (incluso).
      - in: query
        name: to
        schema:
          type: string
          format: date-time
        description: Mostra prenotazioni con inizio antecedente o uguale a questo istante.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "../../components/schemas/common.yaml#/PlaceBooking"
                required:
                - data
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
