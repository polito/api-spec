  "/v2/places/bookings":
    post:
      tags:
      - Common - Places
      summary: Prenota aula/laboratorio
      operationId: createRoomBooking
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../../components/schemas/faculty.yaml#/RoomBookingRequest"
      responses:
        '201':
          "$ref": "../../components/responses.yaml#/CreatedAckResponse"
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '409':
          "$ref": "../../components/responses.yaml#/ConflictResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
    get:
      tags:
      - Common - Places
      summary: Ricerca disponibilità aule
      operationId: searchRoomAvailability
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: siteId
        schema:
          type: string
        description: Sede/ edificio.
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: startTime
        schema:
          type: string
          pattern: "^\\\\d{2}:\\\\d{2}$"
      - in: query
        name: endTime
        schema:
          type: string
          pattern: "^\\\\d{2}:\\\\d{2}$"
      - in: query
        name: capacity
        schema:
          type: integer
          minimum: 1
      - in: query
        name: features
        schema:
          type: array
          items:
            type: string
        description: Es. ["cattedra","prese_corrente"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "../../components/schemas/faculty.yaml#/RoomAvailability"
                required:
                - data
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
