  "/auth/login":
    post:
      tags:
      - Common - Auth
      security: []
      summary: Login
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "../../components/schemas/common.yaml#/LoginRequest"
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/Identity"
                required:
                - data
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/logout":
    delete:
      tags:
      - Common - Auth
      summary: Logout
      description: Invalidates the provided token
      operationId: logout
      responses:
        200:
          description: Success
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/client":
    patch:
      tags:
      - Common - Auth
      summary: Update client version fields | Aggiorna i campi di versione del client
      operationId: appInfo
      requestBody:
        content:
          application/json:
            schema:
              allOf:
              - "$ref": "../../components/schemas/common.yaml#/ClientVersionRequest"
              - "$ref": "../../components/schemas/common.yaml#/FcmRegistrationRequest"
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/UpdateInfo"
                required:
                - data
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/mfa/enrol":
    post:
      tags:
      - Common - Auth
      summary: Enroll a new PUSH token
      operationId: enrolMfa
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  example: some identifier you chose
                  description: User-defined description for the token, pre-populated
                    with the device model
                pubkey:
                  type: string
                  description: Public key generated by the app
                  example: dGhpcyBzaG91bGQgYmUgYW4gZWNkcyBwdWJsaWMga2V5Li4uIHdoYXQgZGlkIHlvdSB0aGluayB0aGlzIHdhcz8hIPCfp5AK
              required:
              - description
              - pubkey
      responses:
        201:
          description: Token successfully enrolled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      serial:
                        type: string
                        description: Unique identifier for the enrolled token
                        example: EDUP000123456
                    required:
                    - serial
                required:
                - data
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/mfa/validate":
    post:
      tags:
      - Common - Auth
      summary: Validate a challenge
      operationId: validateMfa
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                serial:
                  type: string
                  description: Token serial number
                  example: EDUP000123456
                nonce:
                  type: string
                  description: Nonce sent by the IdP
                  example: 65ba9e0e5aac421a9150991638a9d697
                signature:
                  type: string
                  description: Signature generated by signing the nonce in the App
                  example: 83e08d9fc4be3de046318eb3c2c9ae4ede1374a5423a1487b92febc70d106994
                decline:
                  type: boolean
                  description: if set to true, decline the authentication request
                  example: false
              required:
              - serial
              - nonce
              - signature
      responses:
        200:
          description: Challenge validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        description: Indicates whether the validation succeeded
                        example: true
                    required:
                    - success
                required:
                - data
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/mfa/challenge":
    get:
      tags:
      - Common - Auth
      summary: Fetch pending challenge
      operationId: fetchChallenge
      responses:
        200:
          description: The most recent of pending challenges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      serial:
                        type: string
                        description: Token serial number
                        example: EDUP000123456
                      challenge:
                        type: string
                        description: Challenge data to be signed by the App
                        example: dGhpcyBzaG91bGQgYmUgYW4gZWNkcyBwdWJsaWMga2V5Li4uIHdoYXQgZGlkIHlvdSB0aGluayB0aGlzIHdhcz8hIPCfp5AK
                      requestTs:
                        type: string
                        format: date-time
                        description: Challenge request
                        example: '2025-01-01T00:00:00Z'
                      expirationTs:
                        type: string
                        format: date-time
                        description: Challenge expiration
                        example: '2025-01-01T01:00:00Z'
                    required:
                    - serial
                    - challenge
                    - requestTs
                    - expirationTs
                    nullable: true
                required:
                - data
        400:
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        500:
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/mfa/status":
    get:
      tags:
      - Common - Auth
      summary: Get MFA status for the current user
      operationId: getMfaStatus
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/MfaStatusResponse"
                required:
                - data
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/serviceLink/moodle/{course}":
    get:
      tags:
      - Common - Auth
      summary: Get authorised service link for Moodle course
      operationId: getMoodleLink
      parameters:
      - name: course
        in: path
        required: true
        schema:
          type: integer
        description: Moodle course identifier
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/LinkToService"
                required:
                - data
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/serviceLink/liveClass/{meetingID}":
    get:
      tags:
      - Common - Auth
      summary: Get authorised service link for LiveClass meeting
      operationId: getLiveClassLink
      parameters:
      - name: meetingID
        in: path
        required: true
        schema:
          type: string
        description: LiveClass meeting identifier
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/LinkToService"
                required:
                - data
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/auth/serviceLink/mail":
    get:
      tags:
      - Common - Auth
      summary: Get authorised service link for Mail
      operationId: getMailLink
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/common.yaml#/LinkToService"
                required:
                - data
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"