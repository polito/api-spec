  "/emergencies/contacts":
    get:
      tags:
      - Common - Emergencies
      summary: Numeri e riferimenti di emergenza
      operationId: listEmergencyContacts
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "../../components/schemas/common.yaml#/EmergencyContact"
                required:
                - data
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"