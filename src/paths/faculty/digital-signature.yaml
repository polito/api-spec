  "/faculty/signing/documents":
    get:
      tags:
      - Faculty - Digital Signature
      summary: Elenco documenti da firmare
      operationId: listSignableDocuments
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: status
        schema:
          type: string
          enum:
          - pending
          - signed
          - rejected
        description: Filtra per stato del documento.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "../../components/schemas/faculty.yaml#/SignableDocument"
                required:
                - data
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/faculty/signing/documents/{documentId}":
    get:
      tags:
      - Faculty - Digital Signature
      summary: Dettaglio documento da firmare
      operationId: getFacultySigningDocument
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "../../components/parameters.yaml#/DocumentId"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "../../components/schemas/faculty.yaml#/SignableDocument"
                required:
                - data
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '404':
          "$ref": "../../components/responses.yaml#/NotFoundResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/faculty/signing/documents/{documentId}/initiate":
    post:
      tags:
      - Faculty - Digital Signature
      summary: Avvia processo di firma (Step 1)
      description: Inizia il flusso di firma generando una sessione e inviando l'OTP al docente
      operationId: initiateDocumentSigning
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "../../components/parameters.yaml#/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "../../components/schemas/faculty.yaml#/InitiateSigningRequest"
      responses:
        '200':
          description: Sessione creata, OTP inviato
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/faculty.yaml#/InitiateSigningResponse"
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '404':
          "$ref": "../../components/responses.yaml#/NotFoundResponse"
        '409':
          "$ref": "../../components/responses.yaml#/ConflictResponse"
        '429':
          "$ref": "../../components/responses.yaml#/TooManyAttemptsResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/faculty/signing/sessions/{sessionId}/verify-otp":
    post:
      tags:
      - Faculty - Digital Signature
      summary: Verifica OTP (Step 2)
      description: Verifica il codice OTP inserito dall'utente
      operationId: verifySigningOtp
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "../../components/parameters.yaml#/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../../components/schemas/faculty.yaml#/VerifyOtpRequest"
      responses:
        '200':
          description: OTP verificato con successo
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/faculty.yaml#/VerifyOtpResponse"
        '400':
          "$ref": "../../components/responses.yaml#/InvalidOtpResponse"
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '404':
          "$ref": "../../components/responses.yaml#/NotFoundResponse"
        '410':
          "$ref": "../../components/responses.yaml#/SessionExpiredResponse"
        '429':
          "$ref": "../../components/responses.yaml#/TooManyAttemptsResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/faculty/signing/sessions/{sessionId}/sign":
    post:
      tags:
      - Faculty - Digital Signature
      summary: Firma con PIN (Step 3)
      description: Completa la firma digitale inserendo il PIN personale
      operationId: signDocumentWithPin
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "../../components/parameters.yaml#/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../../components/schemas/faculty.yaml#/SignWithPinRequest"
      responses:
        '200':
          description: Documento firmato con successo
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/faculty.yaml#/SignWithPinResponse"
        '400':
          "$ref": "../../components/responses.yaml#/BadRequestResponse"
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '404':
          "$ref": "../../components/responses.yaml#/NotFoundResponse"
        '410':
          "$ref": "../../components/responses.yaml#/SessionExpiredResponse"
        '412':
          "$ref": "../../components/responses.yaml#/PreconditionFailedResponse"
        '429':
          "$ref": "../../components/responses.yaml#/TooManyAttemptsResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"
  "/faculty/signing/sessions/{sessionId}":
    get:
      tags:
      - Faculty - Digital Signature
      summary: Stato sessione di firma
      description: Ottiene lo stato corrente di una sessione di firma (utile per debugging e recovery)
      operationId: getSigningSessionStatus
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "../../components/parameters.yaml#/SessionId"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "../../components/schemas/faculty.yaml#/SessionStatusResponse"
        '401':
          "$ref": "../../components/responses.yaml#/UnauthorizedResponse"
        '404':
          "$ref": "../../components/responses.yaml#/NotFoundResponse"
        '500':
          "$ref": "../../components/responses.yaml#/ErrorResponse"