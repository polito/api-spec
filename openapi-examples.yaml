                  body: '<p>The midterm exam will be held on March 15, 2025</p>'
                  status: VISIBLE
                  publishedAt: '2025-02-03T10:00:00Z'
                  createdAt: '2025-02-03T10:00:00Z'
                  visibleFrom: '2025-02-03T10:00:00Z'
                  visibleTo: null
                  content: '<p>Dear students,</p>\r\r<p>The <strong>midterm exam</strong> for System and Device Programming will be held on:</p>\r\r<p><strong>Date:</strong> March 15, 2025<br />\r<strong>Time:</strong> 9:00 - 11:00<br />\r<strong>Location:</strong> Aula 3I, Cittadella Politecnica</p>\r\r<p>Topics covered:</p>\r<ul>\r<li>Process management and scheduling</li>\r<li>Thread programming with POSIX</li>\r<li>Synchronization primitives</li>\r<li>Basic memory management</li>\r</ul>\r\r<p>Registration opens on March 1st on the Portale della Didattica.</p>\r\r<p>Good luck with your preparation!</p>\r\r<p>Prof. Giovanni Malnati</p>\r'
