    Place:
      allOf:
        - $ref: '#/components/schemas/PlaceOverview'
        - type: object
          properties:
            geoJson:
              description: GeoJSon 'Feature' object
              externalDocs:
                url: 'https://tools.ietf.org/html/rfc7946#section-3.2'
              allOf:
                - description: |
                    GeoJSon object
                    The coordinate reference system for all GeoJSON coordinates is a geographic coordinate reference system, using the World Geodetic System 1984 (WGS 84) datum, with longitude and latitude units of decimal degrees. This is equivalent to the coordinate reference system identified by the Open Geospatial Consortium (OGC) URN An OPTIONAL third-position element SHALL be the height in meters above or below the WGS 84 reference ellipsoid. In the absence of elevation values, applications sensitive to height or depth SHOULD interpret positions as being at local ground or sea level.
                  externalDocs:
                    url: 'https://tools.ietf.org/html/rfc7946#section-3'
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - Feature
                        - FeatureCollection
                        - Point
                        - MultiPoint
                        - LineString
                        - MultiLineString
                        - Polygon
                        - MultiPolygon
                        - GeometryCollection
                    bbox:
                      description: |
                        A GeoJSON object MAY have a member named "bbox" to include information on the coordinate range for its Geometries, Features, or FeatureCollections. The value of the bbox member MUST be an array of length 2*n where n is the number of dimensions represented in the contained geometries, with all axes of the most southwesterly point followed by all axes of the more northeasterly point. The axes order of a bbox follows the axes order of geometries.
                      type: array
                      items:
                        type: number
                  required:
                    - type
                  discriminator:
                    propertyName: type
                - type: object
                  required:
                    - geometry
                    - properties
                  properties:
                    geometry:
                      allOf:
                        - nullable: true
                        - description: |
                            Abstract type for all GeoJSon object except Feature and FeatureCollection
                          externalDocs:
                            url: 'https://tools.ietf.org/html/rfc7946#section-3'
                          allOf:
                            - $ref: '#/components/schemas/Place/allOf/1/properties/geoJson/allOf/0'
                            - type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - Point
                                    - MultiPoint
                                    - LineString
                                    - MultiLineString
                                    - Polygon
                                    - MultiPolygon
                                    - GeometryCollection
                              required:
                                - type
                              discriminator:
                                propertyName: type
                    properties:
                      type: object
                      nullable: true
                    id:
                      oneOf:
                        - type: number
                        - type: string
            capacity:
              type: integer
              example: 300
            structure:
              type: object
              nullable: true
              properties:
                name:
                  type: string
                  example: 'Dipartimento di Ingegneria Strutturale, Edile e Geotecnica'
                shortName:
                  type: string
                  example: DISEG
                email:
                  type: string
                  nullable: true
                  example: null
                phone:
                  type: string
                  nullable: true
                  example: null
              required:
                - name
                - shortName
                - email
                - phone
            resources:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: Personal Computer
                  description:
                    type: string
                    example: Computer fisso da tavolo cablato per la proiezione
                  category:
                    type: string
                    example: Technology
                required:
                  - name
                  - description
                  - category
          required:
            - capacity
            - structure
            - resources
            - geoJson
