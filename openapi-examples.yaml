                    message: Your student smartcard is ready for collection at the Student Office. Please bring your ID document.
                    type: personal
                    senderId: 150157
                    sentAt: '2025-02-01T09:30:00Z'
                    isRead: false
                  - id: 63775589
                    title: Campus Safety Drill Scheduled
                    message: An emergency evacuation drill will be conducted on February 10th at 11:00 AM. Please follow staff instructions during the drill.
                    type: emergency
                    senderId: null
                    sentAt: '2025-01-28T14:00:00Z'
                    isRead: true
                  - id: 63775570
                    title: Career Fair - Engineering
                    message: Join us for the Engineering Career Fair on March 5th at the Cittadella Politecnica. Meet recruiters from leading tech companies.
                    type: event
                    senderId: 150210
                    sentAt: '2025-01-25T10:00:00Z'
                    isRead: true
                  - id: 63775512
                    title: Tuition Payment Reminder
                    message: Reminder to complete your second installment tuition payment by February 15th to avoid late fees.
