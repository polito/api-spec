              example:
                data:
                  - id: email-setup
                    listTitle: Email Setup Guide
                    title: How to Configure Your Polito Email
                    intro: This guide will help you set up your institutional email account on various devices and email clients.
                    fields:
                      - label: Email Address
                        value: s291234@studenti.polito.it
                        isCopyEnabled: true
                      - label: IMAP Server
                        value: imap.polito.it
                        isCopyEnabled: true
                      - label: SMTP Server
                        value: smtp.polito.it
                        isCopyEnabled: true
                    sections:
                      - title: iOS Configuration
                        content: '<p>To configure your Polito email on iOS:</p><ol><li>Open <strong>Settings</strong> and tap <strong>Mail</strong></li><li>Tap <strong>Accounts</strong> then <strong>Add Account</strong></li><li>Select <strong>Other</strong> and choose <strong>Add Mail Account</strong></li><li>Enter your name, email address, and password</li><li>The system will automatically detect the server settings</li></ol>'
                      - title: Android Configuration
                        content: '<p>To configure your Polito email on Android:</p><ol><li>Open the <strong>Gmail</strong> app</li><li>Tap the menu icon and select <strong>Settings</strong></li><li>Tap <strong>Add account</strong> and choose <strong>Other</strong></li><li>Enter your email address and tap <strong>Manual setup</strong></li><li>Choose <strong>Personal (IMAP)</strong> and complete the setup</li></ol>'
                  - id: wifi-access
                    listTitle: Campus WiFi Access
                    title: Connecting to Polito WiFi Network
                    intro: Learn how to connect to the secure campus WiFi network using your institutional credentials.
                    fields:
                      - label: Network Name
                        value: polito-secure
                        isCopyEnabled: true
                      - label: Security Type
                        value: WPA2-Enterprise
                        isCopyEnabled: false
                      - label: Authentication
                        value: PEAP
                        isCopyEnabled: false
                    sections:
                      - title: Windows 10/11
                        content: '<p>Steps to connect on Windows:</p><ol><li>Click the WiFi icon in the system tray</li><li>Select <strong>polito-secure</strong> from the list</li><li>Enter your username (without @studenti.polito.it)</li><li>Enter your institutional password</li><li>Accept the security certificate when prompted</li></ol>'
                      - title: macOS
                        content: '<p>Steps to connect on macOS:</p><ol><li>Click the WiFi icon in the menu bar</li><li>Select <strong>polito-secure</strong></li><li>Enter your credentials and click <strong>Join</strong></li><li>Trust the certificate when prompted</li></ol>'
                  - id: library-access
                    listTitle: Library Resources
                    title: Accessing Library Services
                    intro: Your guide to using the Politecnico library system, including physical locations and online resources.
                    fields:
                      - label: Library Portal
                        value: https://www.biblio.polito.it
                        isCopyEnabled: true
                      - label: Opening Hours
                        value: Mon-Fri 8:30-19:00
                        isCopyEnabled: false
                    sections:
                      - title: Borrowing Books
                        content: '<p>To borrow books from the library:</p><ul><li>Use your student ID card at the self-service kiosks</li><li>Books can be borrowed for up to 30 days</li><li>Renewals can be done online through the portal</li><li>Maximum 10 books at a time</li></ul>'
                      - title: Study Room Booking
                        content: '<p>Reserve individual or group study rooms:</p><ul><li>Book through the Portale della Didattica</li><li>Bookings can be made up to 7 days in advance</li><li>Maximum 3 hours per booking</li><li>Remember to check in when you arrive</li></ul>'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
