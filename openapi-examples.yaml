                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Student'
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /messages:
    get:
      tags:
        - Common - Profile
      summary: List messages | Elenca messaggi
      operationId: getMessages
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                required:
                  - data
              example:
                data:
                  - id: 63775600
