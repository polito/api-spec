      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  errors:
                    type: array
                    description: Additional error details
                    items:
                      $ref: '#/components/schemas/EscError'
                    example:
                      - code: 500
                        message: An error occurred
                        careerId: '123456'
    ErrorResponse:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidOtpResponse:
      description: Codice OTP non valido
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: INVALID_OTP
                  message:
                    type: string
                    example: Codice OTP non valido
                  attemptsRemaining:
                    type: integer
                    description: Tentativi rimasti prima del blocco
                    example: 2
                required:
                  - code
                  - message
                  - attemptsRemaining
            required:
              - error
    NotFoundResponse:
      description: Risorsa non trovata
    PreconditionFailedResponse:
      description: Step precedente non completato
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: STEP_NOT_COMPLETED
                  message:
                    type: string
                    example: Devi completare prima la verifica OTP
                  requiredStep:
                    type: string
                    example: otp_verification
                required:
                  - code
                  - message
                  - requiredStep
            required:
              - error
    SessionExpiredResponse:
      description: Sessione di firma scaduta
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: SESSION_EXPIRED
                  message:
                    type: string
                    example: La sessione di firma è scaduta
                required:
                  - code
                  - message
            required:
              - error
    TooManyAttemptsResponse:
      description: 'Troppi tentativi falliti, sessione bloccata'
      content:
        application/json:
          schema:
            type: object
