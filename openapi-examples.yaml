                  createdAt: '2025-01-28T10:30:00Z'
                  visibleFrom: '2025-02-01T14:00:00Z'
                  visibleTo: '2025-02-15T23:59:59Z'
                  content: '<p>Dear students,</p>\r\r<p>Welcome to the <strong>2025 edition</strong> of System and Device Programming!</p>\r\r<p>Key updates for this year:</p>\r\r<ul>\r<li>First lecture: <strong>Wednesday, February 5, 2025</strong> in Aula 3I from 9:00 to 10:30</li>\r<li>New lab sessions with updated exercises on POSIX threads</li>\r<li>All course materials on <a href=\"https://github.com/polito-sdp-2025\">GitHub</a></li>\r</ul>\r\r<p>Please join our <strong>Slack workspace</strong> for course communications.</p>\r\r<p>See you in class!</p>\r\r<p>Prof. Giovanni Malnati</p>\r'
