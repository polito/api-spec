openapi: 3.1.1
info:
  title: Polito Students API
  version: 2.2.4
  license:
    name: CC BY-NC 4.0
    url: 'https://creativecommons.org/licenses/by-nc/4.0/'
servers:
  - url: 'https://app.didattica.polito.it/api'
    description: Production server (uses live data)
  - url: 'https://app.didattica.polito.it/mock/api'
    description: Mock server (uses example data)
security:
  - bearerAuth: []
tags:
  - name: Common - Auth
    description: Autenticazione e servizi collegati.
  - name: Common - Profile
    description: 'Profilo utente, messaggi, notifiche e preferenze.'
  - name: Common - News
    description: News dell'Ateneo.
  - name: Common - Places
    description: Mappa e POI di ateneo.
  - name: Common - Emergencies
    description: Numeri e riferimenti di emergenza.
  - name: Common - Faults
    description: Segnalazione guasti e tracciamento stato.
  - name: Common - People
    description: Ricerca e dettaglio contatti della comunità di ateneo.
  - name: Common - Bookings
    description: Prenotazioni aule/laboratori e slot disponibili.
  - name: Common - Courses
    description: Consultazione condivisa delle informazioni sui corsi.
  - name: Students - Auth
    description: Funzionalità di autenticazione specifiche per studenti.
  - name: Students - Student
    description: Operazioni sul profilo studente.
  - name: Students - Exams
    description: Gestione prenotazioni e informazioni sugli appelli d'esame.
  - name: Students - Lectures
    description: 'Calendario lezioni, esercitazioni e aule virtuali.'
  - name: Students - Esc
    description: Gestione della European Student Card.
  - name: Students - Tickets
    description: Apertura e monitoraggio ticket di supporto.
  - name: Students - Job offers
    description: Consultazione offerte di lavoro e opportunità di carriera.
  - name: Students - Offering
    description: Navigazione dell'offerta formativa e dei corsi di laurea.
  - name: Students - Surveys
    description: Questionari e rilevazioni rivolte agli studenti.
  - name: Faculty - Profile
    description: Operazioni specifiche sul profilo del docente.
  - name: Faculty - Exams
    description: Gestione appelli e iscritti lato docente.
  - name: Faculty - Courses
    description: 'Gestione incarichi didattici del docente, lezioni, materiali, avvisi e collaboratori.'
  - name: Faculty - Digital Signature
    description: Elenco e firma digitale documenti.
  - name: Faculty - Calendar
    description: Consultazione e gestione dei calendari e degli eventi dell'agenda docente.
x-tagGroups:
  - name: Common
    tags:
      - Common - Auth
      - Common - Profile
      - Common - News
      - Common - Places
      - Common - Emergencies
      - Common - Faults
      - Common - People
      - Common - Bookings
      - Common - Courses
  - name: Students
    tags:
      - Students - Auth
      - Students - Student
      - Students - Exams
      - Students - Lectures
      - Students - Esc
      - Students - Tickets
      - Students - Job offers
      - Students - Offering
      - Students - Surveys
  - name: Faculty
    tags:
      - Faculty - Profile
      - Faculty - Exams
      - Faculty - Courses
      - Faculty - Digital Signature
      - Faculty - Calendar
paths:
  /auth/client:
    patch:
      tags:
        - Common - Auth
      summary: Update client version fields | Aggiorna i campi di versione del client
      operationId: appInfo
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ClientVersionRequest'
                - $ref: '#/components/schemas/FcmRegistrationRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UpdateInfo'
                required:
                  - data
              example:
                data:
                  suggestUpdate: false
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Common - Auth
      security: []
      summary: Login
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Identity'
                required:
                  - data
              example:
                data:
                  username: s291234
                  type: faculty
                  clientId: 8b2e4c91-7a3d-4f5e-b9c1-6d8a2e4f9b3c
                  token: a7f3e9d1c5b8a2e4f6d9c3b7a1e5f8d2
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    delete:
      tags:
        - Common - Auth
      summary: Logout
      description: Invalidates the provided token
      operationId: logout
      responses:
        '200':
          description: Success
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/mfa/challenge:
    get:
      tags:
        - Common - Auth
      summary: Fetch pending challenge
      operationId: fetchChallenge
      responses:
        '200':
          description: The most recent of pending challenges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      serial:
                        type: string
                        description: Token serial number
                        example: EDUP000123456
                      challenge:
                        type: string
                        description: Challenge data to be signed by the App
                        example: dGhpcyBzaG91bGQgYmUgYW4gZWNkcyBwdWJsaWMga2V5Li4uIHdoYXQgZGlkIHlvdSB0aGluayB0aGlzIHdhcz8hIPCfp5AK
                      requestTs:
                        type: string
                        format: date-time
                        description: Challenge request
                        example: '2025-01-01T00:00:00Z'
                      expirationTs:
                        type: string
                        format: date-time
                        description: Challenge expiration
                        example: '2025-01-01T01:00:00Z'
                    required:
                      - serial
                      - challenge
                      - requestTs
                      - expirationTs
                    nullable: true
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/mfa/enrol:
    post:
      tags:
        - Common - Auth
      summary: Enroll a new PUSH token
      operationId: enrolMfa
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  example: some identifier you chose
                  description: 'User-defined description for the token, pre-populated with the device model'
                pubkey:
                  type: string
                  description: Public key generated by the app
                  example: dGhpcyBzaG91bGQgYmUgYW4gZWNkcyBwdWJsaWMga2V5Li4uIHdoYXQgZGlkIHlvdSB0aGluayB0aGlzIHdhcz8hIPCfp5AK
              required:
                - description
                - pubkey
      responses:
        '201':
          description: Token successfully enrolled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      serial:
                        type: string
                        description: Unique identifier for the enrolled token
                        example: EDUP000123456
                    required:
                      - serial
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/mfa/status:
    get:
      tags:
        - Common - Auth
      summary: Get MFA status for the current user
      operationId: getMfaStatus
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MfaStatusResponse'
                required:
                  - data
              examples:
                active:
                  summary: Active MFA session
                  value:
                    data:
                      status: active
                      details:
                        lastAuth: '2025-02-03T08:30:00Z'
                        authCount: 15
                        serial: EDUP000123456
                        description: iPhone 13
                available:
                  summary: MFA available but not authenticated
                  value:
                    data:
                      status: available
                      details: null
                needsReauth:
                  summary: Requires re-authentication
                  value:
                    data:
                      status: needsReauth
                      details: null
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/mfa/validate:
    post:
      tags:
        - Common - Auth
      summary: Validate a challenge
      operationId: validateMfa
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                serial:
                  type: string
                  description: Token serial number
                  example: EDUP000123456
                nonce:
                  type: string
                  description: Nonce sent by the IdP
                  example: 65ba9e0e5aac421a9150991638a9d697
                signature:
                  type: string
                  description: Signature generated by signing the nonce in the App
                  example: 83e08d9fc4be3de046318eb3c2c9ae4ede1374a5423a1487b92febc70d106994
                decline:
                  type: boolean
                  description: 'if set to true, decline the authentication request'
                  example: false
              required:
                - serial
                - nonce
                - signature
      responses:
        '200':
          description: Challenge validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        description: Indicates whether the validation succeeded
                        example: true
                    required:
                      - success
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  '/auth/serviceLink/liveClass/{meetingID}':
    get:
      tags:
        - Common - Auth
      summary: Get authorised service link for LiveClass meeting
      operationId: getLiveClassLink
      parameters:
        - name: meetingID
          in: path
          required: true
          schema:
            type: string
          description: LiveClass meeting identifier
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LinkToService'
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/serviceLink/mail:
    get:
      tags:
        - Common - Auth
      summary: Get authorised service link for Mail
      operationId: getMailLink
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LinkToService'
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  '/auth/serviceLink/moodle/{course}':
    get:
      tags:
        - Common - Auth
      summary: Get authorised service link for Moodle course
      operationId: getMoodleLink
      parameters:
        - name: course
          in: path
          required: true
          schema:
            type: integer
          description: Moodle course identifier
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LinkToService'
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /auth/switch-career:
    post:
      tags:
        - Students - Auth
      summary: Switch career | Cambia carriera
      operationId: switchCareer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: s290683
                client:
                  $ref: '#/components/schemas/Client'
                device:
                  $ref: '#/components/schemas/Device'
              required:
                - username
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Identity'
                required:
                  - data
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /booking-topics:
    get:
      tags:
        - Common - Bookings
      summary: List booking topics | Elenca ambiti di prenotazione
      operationId: getBookingTopics
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookingTopic'
                required:
                  - data
              example:
                data:
                  - id: LIBRARY_STUDY_ROOMS
                    title: Library Study Rooms
                    description: Book individual or group study rooms in university libraries
                    isEnabled: true
                    disclaimer: 'Please arrive on time. Late arrivals forfeit the booking.'
                    showCalendar: true
                    slotLength: 120
                    slotsPerHour: 0.5
                    startDate: '2025-02-03'
                    startHour: 8
                    subtopics:
                      - id: LIBRARY_CIT_STUDY
                        title: Central Library - Cittadella Politecnica
                        description: Study rooms with capacity for 1-8 people
                        isEnabled: true
                        disclaimer: ''
                        showCalendar: true
                        slotLength: 120
                        slotsPerHour: 0.5
                        startDate: '2025-02-03'
                        startHour: 8
                        requirements:
                          - name: Library Rules and Regulations
                            url: 'https://www.biblio.polito.it/en/services/regulations'
                  - id: COMPUTER_LABS
                    title: Computer Labs
                    description: Reserve workstations in computer labs for assignments and projects
                    isEnabled: true
                    disclaimer: 'Booking required for all lab sessions. Maximum 3 hours per day.'
                    showCalendar: true
                    slotLength: 60
                    slotsPerHour: 1
                    startDate: '2025-02-03'
                    startHour: 9
                    subtopics:
                      - id: LAB_LAIB_1
                        title: LAIB 1 - Software Development Lab
                        description: Equipped with latest IDEs and development tools
                        isEnabled: true
                        disclaimer: ''
                        showCalendar: true
                        slotLength: 60
                        slotsPerHour: 1
                        startDate: '2025-02-03'
                        startHour: 9
                        requirements: []
                      - id: LAB_LAIB_2
                        title: LAIB 2 - Data Science Lab
                        description: High-performance computing for data analysis
                        isEnabled: true
                        disclaimer: ''
                        showCalendar: true
                        slotLength: 60
                        slotsPerHour: 1
                        startDate: '2025-02-03'
                        startHour: 9
                        requirements: []
                  - id: STUDENT_SERVICES
                    title: Student Services Appointments
                    description: Book appointments with administrative offices
                    isEnabled: true
                    disclaimer: 'Bring required documents and student ID to your appointment.'
                    showCalendar: true
                    slotLength: 15
                    slotsPerHour: 4
                    startDate: '2025-02-03'
                    startHour: 9
                    subtopics:
                      - id: STUDENT_SEC_GENERAL
                        title: Student Secretary - General Inquiries
                        description: Information about enrollment, transcripts, certificates
                        isEnabled: true
                        disclaimer: ''
                        showCalendar: true
                        slotLength: 15
                        slotsPerHour: 4
                        startDate: '2025-02-03'
                        startHour: 9
                        requirements:
                          - name: Required Documents List
                            url: 'https://didattica.polito.it/documents_checklist.pdf'
                      - id: STUDENT_SEC_INTL
                        title: Student Secretary - International Students
                        description: Support for international students in English
                        isEnabled: true
                        disclaimer: ''
                        showCalendar: true
                        slotLength: 15
                        slotsPerHour: 4
                        startDate: '2025-02-03'
                        startHour: 9
                        requirements: []
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  '/booking-topics/{bookingTopicId}/slots':
    get:
      tags:
        - Common - Bookings
      summary: Show booking slots | Mostra turni prenotabili
      operationId: getBookingSlots
      parameters:
        - name: bookingTopicId
          in: path
          required: true
          schema:
            type: string
        - name: fromDate
          in: query
          description: First day - defaults to monday of current week
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          description: Last day - defaults to sunday of current week
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookingSlot'
                required:
                  - data
              example:
                data:
                  - id: 891234
                    description: ''
                    isBooked: false
                    canBeBooked: true
                    hasSeats: true
                    hasSeatSelection: true
                    places: 140
                    bookedPlaces: 98
                    feedback: '42 seats available'
                    location:
                      name: Central Library - Study Hall A
                      description: Large study hall with individual workstations
                      type: physical
                  - id: 891235
                    description: ''
                    isBooked: true
                    canBeBooked: false
                    hasSeats: false
                    hasSeatSelection: false
                    places: 1
                    bookedPlaces: 1
                    feedback: 'You have already booked this slot'
                    location:
                      name: Student Secretary - Office 102
                      description: ''
                      type: physical
                  - id: 891236
                    description: ''
                    isBooked: false
                    canBeBooked: false
                    hasSeats: true
                    hasSeatSelection: true
                    places: 60
                    bookedPlaces: 60
                    feedback: 'This slot is fully booked'
                    location:
                      name: LAIB 1 - Software Development Lab
                      description: Computer lab with 60 workstations
                      type: physical
                  - id: 891237
                    description: ''
