                    canBeBooked: true
                    hasSeats: false
                    hasSeatSelection: false
                    places: 4
                    bookedPlaces: 2
                    feedback: '2 appointments available'
                    location:
                      name: Virtual Meeting Room
                      description: ''
                      type: virtualPlace
                  - id: 891238
                    description: ''
                    isBooked: false
                    canBeBooked: true
                    hasSeats: true
                    hasSeatSelection: false
                    places: 8
                    bookedPlaces: 5
                    feedback: '3 seats available'
                    location:
                      name: Group Study Room 3B
                      description: Medium-sized study room with whiteboard
                      type: physical
        '404':
          description: Booking topic not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  '/booking-topics/{bookingTopicId}/slots/{bookingSlotId}/seats':
