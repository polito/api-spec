name: Publish API client derived from spec

on:
  workflow_dispatch:
    inputs:
      client:
        description: "Client to publish"
        required: true
        type: choice
        options:
          - student
          - faculty
      version:
        description: "Version (e.g. 1.0.0 or 1.0.0-ALPHA.1)"
        required: true
        type: string
  push:
    tags:
      - "[a-z]+-v[0-9]+.[0-9]+.[0-9]+"
      - "[a-z]+-v[0-9]+.[0-9]+.[0-9]+-ALPHA.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect client and version
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "client=${{ inputs.client }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "client=${GITHUB_REF_NAME%%-v*}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com/

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - id: get_version
        uses: battila7/get-version-action@v2.2.1

      - name: Generate the client
        env:
          TAG_VERSION: ${{ steps.detect.outputs.version || steps.get_version.outputs.version-without-v }}
          CLIENT: ${{ steps.detect.outputs.client }}
        run: |
          echo "const version = \"$TAG_VERSION\";" > src/clients/$CLIENT/version.tsp
          npm install
          npm run build -- $CLIENT

      - name: Publish the client
        run: npm publish
        working-directory: ./dist/${{ steps.detect.outputs.client }}/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
