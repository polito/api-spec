name: Publish API client derived from spec

on:
  push:
    tags:
      - "student-v[0-9]+.[0-9]+.[0-9]+"
      - "student-v[0-9]+.[0-9]+.[0-9]+-ALPHA.[0-9]+"
      - "faculty-v[0-9]+.[0-9]+.[0-9]+"
      - "faculty-v[0-9]+.[0-9]+.[0-9]+-ALPHA.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect client from tag
        id: detect
        run: echo "client=${GITHUB_REF_NAME%%-v*}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com/

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - id: get_version
        uses: battila7/get-version-action@v2.2.1

      - name: Generate the client
        env:
          TAG_VERSION: ${{ steps.get_version.outputs.version-without-v }}
          CLIENT: ${{ steps.detect.outputs.client }}
        run: |
          echo "const version = \"$TAG_VERSION\";" > src/clients/$CLIENT/version.tsp
          npm install
          npm run build:$CLIENT

      - name: Publish the client
        run: npm publish
        working-directory: ./dist/${{ steps.detect.outputs.client }}/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
