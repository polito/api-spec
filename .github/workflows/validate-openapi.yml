name: Validate OpenAPI Specification

on:
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'openapi.yaml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Bundle spec
        run: |
          echo "📦 Bundling src/index.yaml via npm script..."
          npm run bundle

      - name: Validate bundled spec with swagger-cli
        run: |
          echo "✅ Validating bundled spec via npm script..."
          npm run validate

      - name: Install openapi-generator-cli
        run: |
          echo "📥 Installing openapi-generator-cli..."
          npm install -g @openapitools/openapi-generator-cli

      - name: Validate with openapi-generator
        run: |
          echo "✅ Validating with openapi-generator..."
          openapi-generator-cli validate -i openapi.yaml

      - name: Summary
        run: |
          echo ""
          echo "✅ All validation checks passed!"
          echo "   ✓ Spec bundled via npm scripts"
          echo "   ✓ swagger-cli validation passed"
          echo "   ✓ openapi-generator validation passed"
          echo ""
