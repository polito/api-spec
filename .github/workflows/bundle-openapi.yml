name: Bundle OpenAPI Specification

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install swagger-cli
        run: npm install -g swagger-cli

      - name: Bundle OpenAPI spec
        run: |
          echo "📦 Bundling src/index.yaml → openapi.yaml"
          swagger-cli bundle src/index.yaml -o openapi.yaml -t yaml

      - name: Validate bundled spec
        run: |
          echo "✅ Validating bundled spec..."
          swagger-cli validate openapi.yaml

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code openapi.yaml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit bundled file
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.yaml
          git commit -m "chore: auto-bundle OpenAPI spec [skip ci]"
          git push

      - name: Summary
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "✅ OpenAPI spec bundled and committed successfully"
          echo "📄 File: openapi.yaml"
          echo "🔗 Commit: $(git rev-parse HEAD)"

      - name: No changes needed
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "ℹ️ No changes detected - openapi.yaml is already up-to-date"
