security:
  - BearerAuth: []
components:
  schemas:
    Announcement:
      type: object
      required:
        - id
        - title
        - contents
        - scope
        - seen
      properties:
        id:
          type: string
          example: abc-123
        title:
          type: string
          example: Welcome to the app
        contents:
          type: string
          example: Here is a quick guide to get started.
        description:
          type: string
          example: Onboarding announcement
        scope:
          allOf:
            - $ref: '#/components/schemas/AnnouncementScope'
          example: onboarding
        seen:
          type: boolean
          example: false
      example:
        id: abc-123
        title: Welcome to the app
        contents: Here is a quick guide to get started.
        description: Onboarding announcement
        scope: onboarding
        seen: false
    AnnouncementScope:
      type: string
      enum:
        - onboarding
        - appInfo
    AppInfoRequest:
      type: object
      properties:
        buildNumber:
          type: string
          example: '1060200'
        appVersion:
          type: string
          example: 1.6.2
        fcmRegistrationToken:
          type: string
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
    BookExamRequest:
      type: object
      required:
        - courseShortcode
      properties:
        courseShortcode:
          type: string
          example: 01UDROV
        questionId:
          type: integer
        questionOption:
          type: integer
        requestReason:
          type: string
    Booking:
      type: object
      required:
        - id
        - description
        - topic
        - subtopic
        - startsAt
        - endsAt
        - seat
        - cancelableUntil
        - location
      properties:
        id:
          type: integer
          example: 258674
        description:
          type: string
          example: ''
        topic:
          $ref: '#/components/schemas/BookingTopicOverview'
        subtopic:
          type: object
          allOf:
            - $ref: '#/components/schemas/BookingTopicOverview'
          nullable: true
        startsAt:
          type: string
          format: date-time
          example: '2021-10-05T10:00:00Z'
        endsAt:
          type: string
          format: date-time
          example: '2021-10-05T10:15:00Z'
        seat:
          type: object
          properties:
            id:
              type: integer
            row:
              type: string
            column:
              type: string
          nullable: true
        cancelableUntil:
          type: string
          format: date-time
          example: '2021-10-05T09:00:00Z'
        location:
          $ref: '#/components/schemas/BookingPlaceRef'
        locationCheck:
          $ref: '#/components/schemas/BookingLocationCheck'
    BookingLocationCheck:
      type: object
      required:
        - enabled
        - checked
        - latitude
        - longitude
        - radiusInKm
      properties:
        enabled:
          type: boolean
        checked:
          type: boolean
        latitude:
          type: string
          nullable: true
        longitude:
          type: string
          nullable: true
        radiusInKm:
          type: number
          nullable: true
    BookingPhysicalPlaceRef:
      type: object
      required:
        - description
      properties:
        description:
          type: string
      allOf:
        - $ref: '#/components/schemas/PlaceRef'
    BookingPlaceRef:
      type: object
      oneOf:
        - $ref: '#/components/schemas/BookingPhysicalPlaceRef'
        - $ref: '#/components/schemas/BookingVirtualPlaceRef'
      discriminator:
        propertyName: type
        mapping:
          place: '#/components/schemas/BookingPhysicalPlaceRef'
          virtualPlace: '#/components/schemas/BookingVirtualPlaceRef'
    BookingSeatCell:
      type: object
      required:
        - id
        - status
        - label
      properties:
        id:
          type: integer
          example: 20018
        status:
          type: string
          enum:
            - available
            - booked
            - unavailable
          example: available
        label:
          type: string
          example: A5
    BookingSeats:
      type: object
      required:
        - totalCount
        - availableCount
        - rows
      properties:
        totalCount:
          type: integer
        availableCount:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/BookingSeatsRow'
    BookingSeatsRow:
      type: object
      required:
        - label
        - seats
      properties:
        id:
          type: integer
        label:
          type: string
        seats:
          type: array
          items:
            $ref: '#/components/schemas/BookingSeatCell'
    BookingSlot:
      type: object
      required:
        - id
        - description
        - isBooked
        - canBeBooked
        - hasSeats
        - hasSeatSelection
        - places
        - bookedPlaces
        - feedback
        - location
        - startsAt
        - endsAt
        - bookingStartsAt
        - bookingEndsAt
      properties:
        id:
          type: integer
          example: 103051
        description:
          type: string
          example: ''
        isBooked:
          type: boolean
          example: false
        canBeBooked:
          type: boolean
          example: false
        hasSeats:
          type: boolean
          example: false
        hasSeatSelection:
          type: boolean
          example: false
        places:
          type: integer
          example: 2
        bookedPlaces:
          type: integer
          example: 2
        feedback:
          type: string
          example: Il turno è pieno
        location:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            type:
              type: string
            address:
              type: string
        startsAt:
          type: string
          format: date-time
          example: '2021-10-05T10:00:00Z'
        endsAt:
          type: string
          format: date-time
          example: '2021-10-05T10:15:00Z'
        bookingStartsAt:
          type: string
          format: date-time
          example: '2021-10-01T00:00:00Z'
        bookingEndsAt:
          type: string
          format: date-time
          example: '2021-10-05T09:00:00Z'
      example:
        id: 103051
        description: ''
        isBooked: false
        canBeBooked: false
        hasSeats: false
        hasSeatSelection: false
        places: 2
        bookedPlaces: 2
        feedback: Il turno è pieno
        location:
          name: Virtual Classroom della Segreteria Generale Studenti
          description: ''
          type: VC
          address: https://didattica.polito.it/pls/portal30/sviluppo.bbb_corsi.queueRoom?id=SEGRETERIA_GENERALE&p_tipo=SEGRETERIA_GENERALE
        startsAt: '2021-10-05T10:00:00Z'
        endsAt: '2021-10-05T10:15:00Z'
        bookingStartsAt: '2021-10-01T00:00:00Z'
        bookingEndsAt: '2021-10-05T09:00:00Z'
    BookingSubtopic:
      type: object
      required:
        - requirements
      properties:
        requirements:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              url:
                type: string
      allOf:
        - $ref: '#/components/schemas/BookingTopicLeaf'
    BookingTopic:
      type: object
      required:
        - subtopics
      properties:
        subtopics:
          type: array
          items:
            $ref: '#/components/schemas/BookingSubtopic'
      allOf:
        - $ref: '#/components/schemas/BookingTopicLeaf'
      example:
        id: DIDATTICA_ING
        title: Segreteria Didattica Ingegneria
        description: Servizi della Segreteria Didattica Ingegneria
        isEnabled: true
        disclaimer: ''
        showCalendar: true
        slotLength: 15
        slotsPerHour: 4
        startDate: null
        startHour: 8
        endHour: 18
        maxBookingsPerDay: 2
        canBeCancelled: true
        daysPerWeek: 5
        agendaView: false
        subtopics:
          - id: DID_ING_VC_EN
            title: Aspetti didattici di carriera - Sportello virtuale in inglese
            description: ''
            isEnabled: true
            disclaimer: ''
            showCalendar: true
            slotLength: 15
            slotsPerHour: 4
            startDate: null
            startHour: 8
            endHour: 18
            maxBookingsPerDay: 2
            canBeCancelled: true
            daysPerWeek: 5
            agendaView: false
            requirements: []
    BookingTopicLeaf:
      type: object
      required:
        - isEnabled
        - disclaimer
        - showCalendar
        - slotLength
        - slotsPerHour
        - startDate
        - startHour
        - endHour
        - maxBookingsPerDay
        - canBeCancelled
        - daysPerWeek
        - agendaView
      properties:
        isEnabled:
          type: boolean
          example: true
        disclaimer:
          type: string
          example: ''
        showCalendar:
          type: boolean
          example: true
        slotLength:
          type: integer
          example: 15
        slotsPerHour:
          type: integer
          example: 4
        startDate:
          type: string
          format: date
          nullable: true
          description: Start date of the booking period
        startHour:
          type: integer
          example: 8
        endHour:
          type: integer
          example: 18
        maxBookingsPerDay:
          type: integer
          example: 2
        canBeCancelled:
          type: boolean
          example: true
        daysPerWeek:
          type: integer
          description: Number of days per week the booking is available, starting from startDate weekday, or monday if missing
          example: 5
        agendaView:
          type: boolean
          description: Specifies if the topic requires the agenda display
          example: false
      allOf:
        - $ref: '#/components/schemas/BookingTopicOverview'
    BookingTopicOverview:
      type: object
      required:
        - id
        - title
        - description
      properties:
        id:
          type: string
          example: DIDATTICA_ING
        title:
          type: string
          example: Segreteria Didattica Ingegneria
        description:
          type: string
          example: Servizi della Segreteria Didattica Ingegneria
    BookingVirtualPlaceRef:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
        url:
          type: string
    Building:
      type: object
      required:
        - id
        - name
        - siteId
        - category
        - latitude
        - longitude
      properties:
        id:
          type: string
        name:
          type: string
        siteId:
          type: string
        category:
          $ref: '#/components/schemas/PlaceCategoryOverview'
        geoJson:
          $ref: '#/components/schemas/GeoJsonPolygon'
        latitude:
          type: number
          example: 45.064254
        longitude:
          type: number
          example: 7.657823
    BuildingOverview:
      type: object
      required:
        - id
        - name
        - siteId
        - category
      properties:
        id:
          type: string
        name:
          type: string
        siteId:
          type: string
        category:
          $ref: '#/components/schemas/PlaceCategoryOverview'
        geoJson:
          $ref: '#/components/schemas/GeoJsonPolygon'
    Client:
      type: object
      required:
        - buildNumber
        - appVersion
        - name
      properties:
        buildNumber:
          type: string
          example: '1060200'
        appVersion:
          type: string
          example: 1.6.2
        fcmRegistrationToken:
          type: string
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        name:
          type: string
          example: Students app
        id:
          type: string
          example: 5a54f626-4b7e-488e-a0e3-300f54051510
    ClientVersionRequest:
      type: object
      required:
        - buildNumber
        - appVersion
      properties:
        buildNumber:
          type: string
          example: '1060200'
        appVersion:
          type: string
          example: 1.6.2
    Course:
      type: object
      required:
        - id
        - name
        - shortcode
        - cfu
        - teachingPeriod
        - teacherId
        - isOverBooking
        - isInPersonalStudyPlan
        - year
        - links
        - moodleCourses
        - vcPreviousYears
        - vcOtherCourses
        - notifications
        - staff
      properties:
        id:
          type: integer
          nullable: true
          description: The identifier for the current instance of this course. If null this is not a teaching (such as thesis), it won't have a course page
          example: 258674
        name:
          type: string
          example: System and device programming
        shortcode:
          type: string
          example: 01NYHOV
        cfu:
          type: integer
          example: 10
        teachingPeriod:
          type: string
          description: The semester(s) this course belongs to
          example: 2-2
        teacherId:
          type: integer
          nullable: true
          example: 2893
        isOverBooking:
          type: boolean
          example: false
        isInPersonalStudyPlan:
          type: boolean
          description: Included in the PSP | Incluso nel carico didattico
          example: true
        year:
          type: string
          example: '2022'
        links:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                example: https://docs.google.com/document/d/13hpWEDQxziSkhSU0PuqxMXntqZYp3ffDKZ2-umQ7Ywo/edit?usp=sharing
              description:
                type: string
                example: Calendario settimanale dei contenuti del corso
            required:
              - url
        moodleCourses:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Analisi Matematica I
              id:
                type: string
                example: '645376'
          nullable: true
        vcPreviousYears:
          type: array
          items:
            $ref: '#/components/schemas/CourseModuleEdition'
          example:
            - id: 244577
              year: '2021'
        vcOtherCourses:
          type: array
          items:
            type: object
            properties:
              year:
                type: string
                example: '2021'
              id:
                type: integer
                example: 244577
              name:
                type: string
                example: Fisica II
            required:
              - year
              - id
              - name
          description: Other editions/courses to be included in virtual classrooms
        notifications:
          type: object
          properties:
            notices:
              type: boolean
              example: true
            files:
