paths:
  /announcements:
    get:
      operationId: Announcements_getAnnouncements
      summary: List announcements | Lista annunci
      parameters:
        - name: new
          in: query
          required: false
          schema:
            type: boolean
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'
                required:
                  - data
              example:
                data:
                  - id: abc-123
                    title: Welcome to the app
                    contents: Here is a quick guide to get started.
                    description: Onboarding announcement
                    scope: onboarding
                    seen: false
                  - id: def-456
                    title: New feature available
                    contents: Check out the new booking system.
                    scope: appInfo
                    seen: true
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Announcements
  /announcements/{announcementId}/read:
    put:
      operationId: Announcements_markAnnouncementAsRead
      summary: Mark announcement as read | Segna annuncio come letto
      parameters:
